name: "Zigbee2MQTT"
version: "1.40.2"
slug: "zigbee2mqtt"
description: "Zigbee to MQTT bridge, get rid of proprietary Zigbee bridges"
url: "https://github.com/calvinastroboy/calvin-ha-addons/tree/main/zigbee2mqtt"
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
init: false
uart: true
map:
  - share:rw
  - homeassistant_config:rw
ports:
  8080/tcp: 8080
ports_description:
  8080/tcp: "Zigbee2MQTT frontend"
options:
  data_path: "/config/zigbee2mqtt"
  mqtt_base_topic: "zigbee2mqtt"
  mqtt_server: "mqtt://core-mosquitto"
  serial_port: "/dev/ttyACM0"
  serial_adapter: "zstack"
  permit_join: false
schema:
  data_path: str
  mqtt_base_topic: str
  mqtt_server: str
  serial_port: "device(subsystem=tty)"
  serial_adapter: list(zstack|deconz|zigate|ezsp|ember|zboss)
  permit_join: bool
startup: services
webui: "http://[HOST]:[PORT:8080]"

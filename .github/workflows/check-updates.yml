name: Check for upstream updates

on:
  schedule:
    # Run weekly (Sundays at 6:00 AM UTC) - Reduced frequency since we use fixed versions
    - cron: '0 6 * * 0'
  workflow_dispatch:

jobs:
  check-updates:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check all upstream versions
        id: check-versions
        run: |
          echo "## Available Updates" > updates_report.md
          echo "" >> updates_report.md
          echo "The following updates are available. **Manual action required** to update." >> updates_report.md
          echo "" >> updates_report.md

          HAS_UPDATES=false

          # Check FRP
          CURRENT_FRP=$(cat versions.json | jq -r '.["frp-client"].current_frp_version')
          LATEST_FRP=$(curl -s https://api.github.com/repos/fatedier/frp/releases/latest | jq -r .tag_name)
          if [ "$CURRENT_FRP" != "$LATEST_FRP" ]; then
            echo "### 🔧 FRP Client" >> updates_report.md
            echo "- Current: \`$CURRENT_FRP\`" >> updates_report.md
            echo "- Latest: \`$LATEST_FRP\`" >> updates_report.md
            echo "- File to update: \`frp-client/Dockerfile\`" >> updates_report.md
            echo "" >> updates_report.md
            HAS_UPDATES=true
          fi

          # Check Tailscale
          CURRENT_TS=$(cat versions.json | jq -r '.["tailscale"].current_tailscale_version')
          LATEST_TS=$(curl -s https://api.github.com/repos/tailscale/tailscale/releases/latest | jq -r .tag_name | sed 's/v//')
          if [ "$CURRENT_TS" != "$LATEST_TS" ]; then
            echo "### 🔧 Tailscale" >> updates_report.md
            echo "- Current: \`$CURRENT_TS\`" >> updates_report.md
            echo "- Latest: \`$LATEST_TS\`" >> updates_report.md
            echo "- Files to update: \`tailscale/Dockerfile\`, \`tailscale/config.yaml\`" >> updates_report.md
            echo "" >> updates_report.md
            HAS_UPDATES=true
          fi

          # Check Filebrowser
          CURRENT_FB=$(cat versions.json | jq -r '.["filebrowser"].current_filebrowser_version')
          LATEST_FB=$(curl -s https://api.github.com/repos/filebrowser/filebrowser/releases/latest | jq -r .tag_name)
          if [ "$CURRENT_FB" != "$LATEST_FB" ]; then
            echo "### 🔧 Filebrowser" >> updates_report.md
            echo "- Current: \`$CURRENT_FB\`" >> updates_report.md
            echo "- Latest: \`$LATEST_FB\`" >> updates_report.md
            echo "- File to update: \`filebrowser/Dockerfile\`" >> updates_report.md
            echo "" >> updates_report.md
            HAS_UPDATES=true
          fi

          # Check Zigbee2MQTT
          CURRENT_Z2M=$(cat versions.json | jq -r '.["zigbee2mqtt"].current_z2m_version')
          LATEST_Z2M=$(curl -s https://hub.docker.com/v2/repositories/koenkk/zigbee2mqtt/tags/ | jq -r '.results[] | select(.name != "latest" and .name != "dev") | .name' | sort -V | tail -1)
          if [ "$CURRENT_Z2M" != "$LATEST_Z2M" ]; then
            echo "### 🔧 Zigbee2MQTT" >> updates_report.md
            echo "- Current: \`$CURRENT_Z2M\`" >> updates_report.md
            echo "- Latest: \`$LATEST_Z2M\`" >> updates_report.md
            echo "- Files to update: \`zigbee2mqtt/Dockerfile\`, \`zigbee2mqtt/config.yaml\`" >> updates_report.md
            echo "" >> updates_report.md
            HAS_UPDATES=true
          fi

          # Check Node-RED
          CURRENT_NR=$(cat versions.json | jq -r '.["node-red"].current_nodered_version')
          LATEST_NR=$(curl -s https://hub.docker.com/v2/repositories/nodered/node-red/tags/ | jq -r '.results[] | select(.name != "latest" and .name != "dev" and .name != "minimal" and .name != "latest-18" and .name != "latest-16") | .name' | grep -E '^[0-9]+\.[0-9]+\.[0-9]+$' | sort -V | tail -1)
          if [ "$CURRENT_NR" != "$LATEST_NR" ]; then
            echo "### 🔧 Node-RED" >> updates_report.md
            echo "- Current: \`$CURRENT_NR\`" >> updates_report.md
            echo "- Latest: \`$LATEST_NR\`" >> updates_report.md
            echo "- Files to update: \`node-red/Dockerfile\`, \`node-red/build.yaml\`, \`node-red/config.yaml\`" >> updates_report.md
            echo "" >> updates_report.md
            HAS_UPDATES=true
          fi

          # Check ESPHome
          CURRENT_ESPH=$(cat versions.json | jq -r '.["esphome"].current_esphome_version')
          LATEST_ESPH=$(curl -s https://hub.docker.com/v2/repositories/esphome/esphome/tags/ | jq -r '.results[] | select(.name != "latest" and .name != "beta" and .name != "dev") | .name' | grep -E '^[0-9]+\.[0-9]+\.[0-9]+$' | sort -V | tail -1)
          if [ "$CURRENT_ESPH" != "$LATEST_ESPH" ]; then
            echo "### 🔧 ESPHome" >> updates_report.md
            echo "- Current: \`$CURRENT_ESPH\`" >> updates_report.md
            echo "- Latest: \`$LATEST_ESPH\`" >> updates_report.md
            echo "- Files to update: \`esphome/Dockerfile\`, \`esphome/build.yaml\`, \`esphome/config.yaml\`" >> updates_report.md
            echo "" >> updates_report.md
            HAS_UPDATES=true
          fi

          if [ "$HAS_UPDATES" = "false" ]; then
            echo "All add-ons are up to date!" >> updates_report.md
          fi

          echo "has_updates=$HAS_UPDATES" >> $GITHUB_OUTPUT

      - name: Create Issue for Available Updates
        if: steps.check-versions.outputs.has_updates == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('updates_report.md', 'utf8');

            // Check if there's already an open issue for updates
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'updates-available'
            });

            if (issues.data.length === 0) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: 'Available upstream updates',
                body: report,
                labels: ['updates-available']
              });
            } else {
              // Update existing issue
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issues.data[0].number,
                body: report
              });
            }

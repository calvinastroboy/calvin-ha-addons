name: "ESPHome"
version: "2024.10.0"
slug: "esphome"
description: "ESPHome add-on for programming ESP8266/ESP32 devices"
url: "https://github.com/calvinastroboy/calvin-ha-addons/tree/main/esphome"
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
init: false
uart: true
usb: true
devices:
  - /dev/ttyUSB0
  - /dev/ttyACM0
  - /dev/ttyAMA0
map:
  - config:rw
  - ssl:rw
ports:
  6052/tcp: 6052
ports_description:
  6052/tcp: "ESPHome dashboard"
options:
  ssl: false
  certfile: "fullchain.pem"
  keyfile: "privkey.pem"
  leave_front_door_open: false
schema:
  ssl: bool
  certfile: str
  keyfile: str
  leave_front_door_open: bool
startup: services
webui: "http://[HOST]:[PORT:6052]"

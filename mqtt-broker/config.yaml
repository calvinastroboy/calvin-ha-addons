name: "MQTT Broker"
version: "2.0.18"
slug: "mqtt_broker"
description: "Open source MQTT broker (Mosquitto)"
url: "https://github.com/calvinastroboy/calvin-ha-addons/tree/main/mqtt-broker"
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386
init: false
map:
  - share:rw
ports:
  1883/tcp: 1883
  9001/tcp: 9001
ports_description:
  1883/tcp: "MQTT protocol"
  9001/tcp: "WebSocket protocol"
options:
  username: ""
  password: ""
  anonymous: true
  ssl: false
  certfile: "fullchain.pem"
  keyfile: "privkey.pem"
  custom_config: ""
schema:
  username: str?
  password: str?
  anonymous: bool
  ssl: bool
  certfile: str
  keyfile: str
  custom_config: str?
startup: services

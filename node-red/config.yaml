name: "Node-RED"
version: "3.1.10"
slug: "node_red"
description: "Flow-based programming for the Internet of Things"
url: "https://github.com/calvinastroboy/calvin-ha-addons/tree/main/node-red"
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
init: false
map:
  - config:rw
  - share:rw
  - ssl:rw
ports:
  1880/tcp: 1880
ports_description:
  1880/tcp: "Web interface"
options:
  credential_secret: ""
  theme: "default"
  http_node:
    username: ""
    password: ""
  http_static:
    username: ""
    password: ""
  ssl: false
  certfile: "fullchain.pem"
  keyfile: "privkey.pem"
  require_ssl: false
  system_packages: []
  npm_packages: []
  init_commands: []
schema:
  credential_secret: str?
  theme: list(default|midnight-red|midnight-blue|oled|solarized-light|solarized-dark)
  http_node:
    username: str?
    password: str?
  http_static:
    username: str?
    password: str?
  ssl: bool
  certfile: str
  keyfile: str
  require_ssl: bool
  system_packages:
    - str?
  npm_packages:
    - str?
  init_commands:
    - str?
startup: system
webui: "http://[HOST]:[PORT:1880]"
